<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#f5f5f7" stroke="#d1d5db" stroke-width="1"/>
  <!-- Notebook body -->
  <rect x="50" y="35" width="100" height="130" rx="6" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
  <!-- Spine binding rings -->
  <circle cx="50" cy="55" r="4" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="50" cy="80" r="4" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="50" cy="105" r="4" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="50" cy="130" r="4" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="50" cy="155" r="4" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <!-- Ruled lines -->
  <line x1="65" y1="60" x2="138" y2="60" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="65" y1="75" x2="138" y2="75" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="65" y1="90" x2="138" y2="90" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="65" y1="105" x2="138" y2="105" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="65" y1="120" x2="138" y2="120" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="65" y1="135" x2="138" y2="135" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="65" y1="150" x2="138" y2="150" stroke="#d1d5db" stroke-width="0.8"/>
  <!-- Written text lines (ink) -->
  <line x1="65" y1="60" x2="125" y2="60" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="65" y1="75" x2="132" y2="75" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="65" y1="90" x2="110" y2="90" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="65" y1="105" x2="128" y2="105" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pencil -->
  <g transform="translate(120, 130) rotate(35)">
    <rect x="0" y="-4" width="45" height="8" rx="1" fill="#f59e0b"/>
    <polygon points="45,-4 55,0 45,4" fill="#374151"/>
    <rect x="0" y="-4" width="8" height="8" rx="1" fill="#f472b6" opacity="0.7"/>
  </g>
</svg>
